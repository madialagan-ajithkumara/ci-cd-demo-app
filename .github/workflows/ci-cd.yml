name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build App
        run: npm run build

      - name: Set Version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF_NAME}
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo-app:${VERSION} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo-app:${VERSION} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo-app:${VERSION}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo-app:latest

      - name: Done
        run: echo "CI/CD Pipeline Completed 🚀 Version: $VERSION"